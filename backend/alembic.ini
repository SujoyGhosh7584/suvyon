[alembic]

# Migration scripts location
script_location = alembic

# Allow imports from backend/app
prepend_sys_path = .

# IMPORTANT:
# Database URL is loaded from app.core.config.settings
# in alembic/env.py
# Do not put Supabase password here.
sqlalchemy.url =


# ----------------------------------------------------------
# Post Write Hooks
# ----------------------------------------------------------

[post_write_hooks]


# ----------------------------------------------------------
# Logging
# ----------------------------------------------------------

[loggers]
keys = root,sqlalchemy,alembic


[handlers]
keys = console


[formatters]
keys = generic



[logger_root]
level = WARN
handlers = console



[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine



[logger_alembic]
level = INFO
handlers = console
qualname = alembic



[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic



[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s